<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Echo Echo — Docs</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;background:#fff;color:#0d0d0d;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.7}

    :root{
      --dark:#0d0d0d;
      --white:#fff;
      --grey97:#f7f7f7;
      --greyF0:#f0f0f0;
      --greyD:#d4d4d4;
      --grey6:#616161;
      --grad:linear-gradient(135deg,#ff5858 0%,#c058ff 100%);
      --nav-h:60px;
      --sidebar-w:300px;
    }

    /* ── TOP NAV ── */
    .topnav{
      position:fixed;top:0;left:0;right:0;z-index:9999;
      height:var(--nav-h);
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(0,0,0,.08);
      display:flex;align-items:center;padding:0 1.5rem;gap:.75rem;
    }
    .nav-logo{display:flex;align-items:center;gap:.45rem;text-decoration:none;flex-shrink:0}
    .nav-logo-icon{width:30px;height:30px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center}
    .nav-logo-icon svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round}
    .nav-wordmark{font-size:1rem;font-weight:800;letter-spacing:-.03em;color:var(--dark)}
    .nav-wordmark em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .nav-sep{width:1px;height:16px;background:rgba(0,0,0,.1);flex-shrink:0}
    .nav-tag{font-size:.78rem;font-weight:600;color:var(--grey6);letter-spacing:.01em}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
    .nav-link{font-size:.84rem;font-weight:500;color:var(--grey6);text-decoration:none;padding:.3rem .6rem;border-radius:6px;transition:background .15s,color .15s}
    .nav-link:hover{background:var(--greyF0);color:var(--dark)}
    .nav-btn{font-size:.84rem;font-weight:600;color:#fff;background:var(--dark);padding:.35rem .85rem;border-radius:7px;text-decoration:none;transition:opacity .15s}
    .nav-btn:hover{opacity:.8}
    .nav-version{font-size:.72rem;font-weight:700;background:var(--greyF0);color:var(--grey6);padding:.2rem .55rem;border-radius:20px;letter-spacing:.02em}

    /* ── LAYOUT ── */
    .layout{display:flex;margin-top:var(--nav-h);min-height:calc(100vh - var(--nav-h))}

    /* ── SIDEBAR ── */
    .sidebar{
      width:var(--sidebar-w);
      flex-shrink:0;
      position:sticky;top:var(--nav-h);
      height:calc(100vh - var(--nav-h));
      overflow-y:auto;
      border-right:1px solid rgba(0,0,0,.07);
      padding:1.75rem 0 3rem;
      background:#fff;
    }
    .sidebar::-webkit-scrollbar{width:4px}
    .sidebar::-webkit-scrollbar-thumb{background:var(--greyD);border-radius:4px}

    .sidenav-group{margin-bottom:1.5rem}
    .sidenav-label{
      font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:var(--grey6);padding:.25rem 1.5rem .35rem;display:block;
    }
    .sidenav-item{
      display:flex;align-items:center;gap:.55rem;
      padding:.42rem 1.5rem;font-size:.9rem;font-weight:500;
      color:#444;text-decoration:none;cursor:pointer;
      border-left:2px solid transparent;
      transition:background .12s,color .12s,border-color .12s;
    }
    .sidenav-item:hover{background:var(--grey97);color:var(--dark)}
    .sidenav-item.active{
      background:rgba(192,88,255,.07);color:#9b2af9;
      border-left-color:#9b2af9;font-weight:600;
    }
    .method-badge{
      font-size:.62rem;font-weight:700;letter-spacing:.04em;
      padding:.18rem .44rem;border-radius:4px;flex-shrink:0;font-family:'JetBrains Mono',monospace;
    }
    .badge-post{background:#fef3c7;color:#b45309}
    .badge-get{background:#d1fae5;color:#065f46}

    /* ── CONTENT ── */
    .content{flex:1;padding:3rem 4rem 5rem;max-width:860px;min-width:0}

    /* ── PAGE SECTIONS ── */
    .page-header{margin-bottom:2.5rem;padding-bottom:1.75rem;border-bottom:1px solid var(--greyF0)}
    .page-eyebrow{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#9b2af9;margin-bottom:.6rem}
    .page-title{font-size:2.2rem;font-weight:800;letter-spacing:-.04em;line-height:1.15;color:var(--dark);margin-bottom:.8rem}
    .page-desc{font-size:1.08rem;color:var(--grey6);line-height:1.65;max-width:640px}

    h2{font-size:1.35rem;font-weight:700;letter-spacing:-.025em;color:var(--dark);margin:2.5rem 0 .9rem}
    h3{font-size:1.1rem;font-weight:600;letter-spacing:-.02em;color:var(--dark);margin:1.8rem 0 .6rem}
    p{margin-bottom:1rem;color:#333;font-size:1rem}
    ul,ol{padding-left:1.4rem;margin-bottom:1rem}
    li{margin-bottom:.35rem;font-size:1rem;color:#333}
    li strong{color:var(--dark)}
    a{color:#9b2af9;text-decoration:none}
    a:hover{text-decoration:underline}
    code{font-family:'JetBrains Mono',monospace;font-size:.84em;background:var(--greyF0);padding:.15em .35em;border-radius:4px;color:#c026d3}
    strong{color:var(--dark);font-weight:600}

    /* ── CODE BLOCK ── */
    .code-block{
      background:#0f0f0f;border-radius:10px;overflow:hidden;
      margin:1rem 0 1.5rem;font-size:.875rem;
      border:1px solid rgba(255,255,255,.06);
    }
    .code-block-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:.6rem 1rem;background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.06);
    }
    .code-block-lang{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#666;font-family:'JetBrains Mono',monospace}
    .copy-btn{
      font-size:.72rem;font-weight:600;color:#666;background:rgba(255,255,255,.07);
      border:none;border-radius:5px;padding:.3rem .65rem;cursor:pointer;
      font-family:'Inter',sans-serif;transition:background .15s,color .15s;
    }
    .copy-btn:hover{background:rgba(255,255,255,.12);color:#ddd}
    .copy-btn.copied{color:#4ade80}
    pre{padding:1.1rem 1.25rem;overflow-x:auto;line-height:1.65}
    pre code{background:none;padding:0;color:#e5e5e5;font-size:.875rem;border-radius:0}
    .kw{color:#c084fc}
    .str{color:#86efac}
    .cm{color:#525252;font-style:italic}
    .fn{color:#93c5fd}
    .num{color:#fdba74}
    .key{color:#67e8f9}

    /* ── CODE TABS ── */
    .code-tabs{margin:1rem 0 1.5rem;border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.08)}
    .tab-bar{display:flex;background:var(--grey97);border-bottom:1px solid var(--greyD);gap:0}
    .tab-btn{
      padding:.55rem 1.1rem;font-size:.82rem;font-weight:600;font-family:'Inter',sans-serif;
      background:none;border:none;cursor:pointer;color:#666;
      border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;
    }
    .tab-btn.active{color:#9b2af9;border-bottom-color:#9b2af9}
    .tab-btn:hover:not(.active){color:var(--dark)}
    .tab-content{display:none;background:#0f0f0f}
    .tab-content.active{display:block}
    .tab-content pre{border-radius:0;margin:0}

    /* ── CALLOUT ── */
    .callout{
      border-radius:10px;padding:1rem 1.2rem;margin:1.25rem 0;font-size:.95rem;
      display:flex;gap:.75rem;align-items:flex-start;
    }
    .callout-info{background:#f0f9ff;border:1px solid #bae6fd;color:#0c4a6e}
    .callout-warn{background:#fffbeb;border:1px solid #fde68a;color:#78350f}
    .callout-tip{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}
    .callout-icon{font-size:1.1rem;flex-shrink:0;margin-top:.05rem}
    .callout p{margin:0;color:inherit}

    /* ── CARD GRID ── */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1rem;margin:1rem 0 1.5rem}
    .card{background:var(--grey97);border:1px solid var(--greyD);border-radius:12px;padding:1.25rem;transition:border-color .15s,box-shadow .15s}
    .card:hover{border-color:#c084fc;box-shadow:0 2px 12px rgba(192,88,255,.1)}
    .card-icon{font-size:1.5rem;margin-bottom:.6rem}
    .card-name{font-size:.94rem;font-weight:700;color:var(--dark);margin-bottom:.3rem}
    .card-desc{font-size:.84rem;color:var(--grey6);line-height:1.55}

    /* ── PARAM TABLE ── */
    .param-table{width:100%;border-collapse:collapse;margin:1rem 0 1.5rem;font-size:.9rem}
    .param-table th{text-align:left;padding:.6rem 1rem;background:var(--grey97);font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--grey6)}
    .param-table td{padding:.65rem 1rem;border-bottom:1px solid var(--greyF0);vertical-align:top}
    .param-table tr:last-child td{border-bottom:none}
    .param-table code{font-size:.8rem}
    .param-req{font-size:.7rem;font-weight:700;padding:.18rem .44rem;border-radius:4px;background:#fee2e2;color:#b91c1c;letter-spacing:.03em}
    .param-opt{font-size:.7rem;font-weight:700;padding:.18rem .44rem;border-radius:4px;background:var(--greyF0);color:var(--grey6);letter-spacing:.03em}

    /* ── ENDPOINT BLOCK ── */
    .endpoint{
      border:1px solid var(--greyD);border-radius:12px;overflow:hidden;margin:1.5rem 0 2rem;
    }
    .endpoint-header{
      display:flex;align-items:center;gap:.75rem;padding:.9rem 1.25rem;background:var(--grey97);
      border-bottom:1px solid var(--greyD);
    }
    .endpoint-method{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;padding:.3rem .7rem;border-radius:6px;letter-spacing:.04em}
    .method-post{background:#fef3c7;color:#b45309}
    .method-get{background:#d1fae5;color:#065f46}
    .endpoint-path{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:500;color:var(--dark)}
    .endpoint-desc{font-size:.85rem;color:var(--grey6);margin-left:auto}
    .endpoint-body{padding:1.25rem}
    .endpoint-body h4{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--grey6);margin-bottom:.75rem;margin-top:1.25rem}
    .endpoint-body h4:first-child{margin-top:0}

    /* ── STEP LIST ── */
    .step-list{list-style:none;padding:0;counter-reset:step;margin:1rem 0}
    .step-list li{counter-increment:step;display:flex;gap:1rem;margin-bottom:1.2rem;align-items:flex-start}
    .step-list li::before{
      content:counter(step);
      width:28px;height:28px;border-radius:50%;background:var(--dark);color:#fff;
      font-size:.78rem;font-weight:800;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;margin-top:.1rem;
    }
    .step-body{flex:1}
    .step-title{font-weight:700;color:var(--dark);margin-bottom:.25rem;font-size:.97rem}
    .step-desc{font-size:.9rem;color:#555;line-height:1.55}

    /* ── PREV/NEXT ── */
    .pagination{display:flex;gap:1rem;margin-top:3.5rem;padding-top:2rem;border-top:1px solid var(--greyF0)}
    .page-nav{
      flex:1;padding:1rem 1.25rem;border:1px solid var(--greyD);border-radius:10px;
      cursor:pointer;background:#fff;text-decoration:none;
      transition:border-color .15s,box-shadow .15s;display:block;
    }
    .page-nav:hover{border-color:#c084fc;box-shadow:0 2px 10px rgba(192,88,255,.12);text-decoration:none}
    .page-nav.prev{text-align:left}
    .page-nav.next{text-align:right}
    .page-nav-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--grey6);margin-bottom:.25rem}
    .page-nav-title{font-size:.95rem;font-weight:700;color:var(--dark)}
    .page-nav-arrow{color:#9b2af9;font-size:1.1rem}
    .page-nav-spacer{flex:1}

    /* ── ARCH DIAGRAM ── */
    .arch{display:flex;flex-direction:column;gap:.6rem;margin:1.5rem 0;padding:1.5rem;background:var(--grey97);border-radius:12px;border:1px solid var(--greyD)}
    .arch-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .arch-box{padding:.5rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;border:1px solid;white-space:nowrap}
    .arch-arrow{color:var(--grey6);font-size:1rem;flex-shrink:0}
    .arch-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--grey6);flex-shrink:0;min-width:90px}

    @media(max-width:768px){
      .sidebar{display:none}
      .content{padding:2rem 1.25rem}
    }
  </style>
</head>
<body>

<nav class="topnav">
  <a class="nav-logo" href="/">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3 L19 7 L19 17 L12 21 L5 17 L5 7 Z" stroke="#fff" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3" fill="#fff"/></svg>
    </div>
    <span class="nav-wordmark"><em>Echo</em> Echo</span>
  </a>
  <div class="nav-sep"></div>
  <span class="nav-tag">Documentation</span>
  <div class="nav-right">
    <span class="nav-version">v2.0</span>
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/api/docs" target="_blank">API Ref</a>
    <a class="nav-btn" href="/dashboard.html">Open App</a>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <nav id="sidenav"></nav>
  </aside>
  <main class="content" id="content"></main>
</div>

<script>
// ─── ROUTE DEFINITIONS ───────────────────────────────────────────────────────
const NAV = [
  { group: 'Introduction' },
  { label: 'Overview',           path: '/docs' },
  { label: 'How It Works',       path: '/docs/how-it-works' },
  { group: 'Setup' },
  { label: 'Tech Stack',         path: '/docs/tech-stack' },
  { label: 'Getting Started',    path: '/docs/getting-started' },
  { label: 'Environment Vars',   path: '/docs/environment' },
  { group: 'API Reference' },
  { label: 'Generate Music',     path: '/docs/api/generate',   method: 'POST' },
  { label: 'Lyrics',             path: '/docs/api/lyrics',     method: 'GET' },
  { label: 'Copyright Check',    path: '/docs/api/copyright',  method: 'POST' },
  { label: 'Authentication',     path: '/docs/api/auth',       method: 'POST' },
  { label: 'Library',            path: '/docs/api/library',    method: 'GET' },
  { group: 'Deploy' },
  { label: 'Render Deployment',  path: '/docs/deployment' },
];

const FLAT = NAV.filter(n => n.path);
function pageIndex(path) { return FLAT.findIndex(n => n.path === path); }
function prevPage(path) { const i = pageIndex(path); return i > 0 ? FLAT[i-1] : null; }
function nextPage(path) { const i = pageIndex(path); return i < FLAT.length-1 ? FLAT[i+1] : null; }

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function navigate(path) {
  history.pushState(null, '', path);
  render(path);
}
window.addEventListener('popstate', () => render(location.pathname));

// ─── SIDEBAR RENDER ──────────────────────────────────────────────────────────
function renderSidebar(activePath) {
  const html = NAV.map(n => {
    if (n.group) return `<span class="sidenav-label">${n.group}</span>`;
    const active = n.path === activePath ? ' active' : '';
    const badge = n.method
      ? `<span class="method-badge badge-${n.method.toLowerCase()}">${n.method}</span>`
      : '';
    return `<a class="sidenav-item${active}" onclick="navigate('${n.path}');return false;" href="${n.path}">${badge}${n.label}</a>`;
  }).join('');
  document.getElementById('sidenav').innerHTML = `<div class="sidenav-group">${html}</div>`;
}

// ─── PAGINATION ──────────────────────────────────────────────────────────────
function paginationHTML(path) {
  const prev = prevPage(path);
  const next = nextPage(path);
  if (!prev && !next) return '';
  return `<div class="pagination">
    ${prev ? `<a class="page-nav prev" onclick="navigate('${prev.path}');return false;" href="${prev.path}">
      <div class="page-nav-label"><span class="page-nav-arrow">←</span> Previous</div>
      <div class="page-nav-title">${prev.label}</div>
    </a>` : '<div class="page-nav-spacer"></div>'}
    ${next ? `<a class="page-nav next" onclick="navigate('${next.path}');return false;" href="${next.path}">
      <div class="page-nav-label">Next <span class="page-nav-arrow">→</span></div>
      <div class="page-nav-title">${next.label}</div>
    </a>` : '<div class="page-nav-spacer"></div>'}
  </div>`;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function codeBlock(lang, code) {
  return `<div class="code-block">
    <div class="code-block-header">
      <span class="code-block-lang">${lang}</span>
      <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    </div>
    <pre><code>${code}</code></pre>
  </div>`;
}

function codeTabs(tabs) {
  const id = 'ct_' + Math.random().toString(36).slice(2,8);
  const btns = tabs.map((t,i) => `<button class="tab-btn${i===0?' active':''}" onclick="switchTab('${id}',${i})">${t.label}</button>`).join('');
  const panes = tabs.map((t,i) => `<div class="tab-content${i===0?' active':''}"><pre><code>${t.code}</code></pre></div>`).join('');
  return `<div class="code-tabs" id="${id}">
    <div class="tab-bar">${btns}</div>
    ${panes}
  </div>`;
}

function switchTab(id, idx) {
  const el = document.getElementById(id);
  el.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  el.querySelectorAll('.tab-content').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function copyCode(btn) {
  const code = btn.closest('.code-block,.code-tabs').querySelector('pre code');
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

// ─── PAGE CONTENT ────────────────────────────────────────────────────────────
const PAGES = {

'/docs': () => `
<div class="page-header">
  <div class="page-eyebrow">Introduction</div>
  <h1 class="page-title">Echo Echo Documentation</h1>
  <p class="page-desc">Echo Echo is an AI-powered songwriting tool that generates short instrumental sketches, writes matching lyrics, and checks copyright safety — all from a mood, genre, and theme you choose.</p>
</div>

<h2>What can Echo Echo do?</h2>
<div class="card-grid">
  <div class="card"><div class="card-icon">🎵</div><div class="card-name">Generate Music</div><div class="card-desc">30-second instrumental sketches via Kie.AI (powered by Suno v4) — professional quality in under a minute.</div></div>
  <div class="card"><div class="card-icon">✍️</div><div class="card-name">Write Lyrics</div><div class="card-desc">A CrewAI + Groq agent writes verse/chorus/bridge lyrics tuned to your mood, style, and energy level.</div></div>
  <div class="card"><div class="card-icon">🛡️</div><div class="card-name">Copyright Safety</div><div class="card-desc">An AI copyright agent checks generated lyrics for similarity to known songs before you publish.</div></div>
  <div class="card"><div class="card-icon">📚</div><div class="card-name">Song Library</div><div class="card-desc">Browse, replay, download, and trim every track you've generated — persisted per session.</div></div>
</div>

<h2>How to get started</h2>
<ol class="step-list">
  <li><div class="step-body"><div class="step-title">Clone the repo</div><div class="step-desc">Pull the project from GitHub and install Python dependencies.</div></div></li>
  <li><div class="step-body"><div class="step-title">Set environment variables</div><div class="step-desc">Add your <code>GROQ_API_KEY</code> and optionally <code>KIEAI_API_KEY</code> to a <code>.env</code> file.</div></div></li>
  <li><div class="step-body"><div class="step-title">Run the server</div><div class="step-desc">Start with <code>uvicorn backend.main:app --reload --port 8000</code> — the frontend and backend are served together.</div></div></li>
  <li><div class="step-body"><div class="step-title">Open the app</div><div class="step-desc">Navigate to <code>http://localhost:8000</code> — sign up and start generating.</div></div></li>
</ol>

<div class="callout callout-info">
  <span class="callout-icon">ℹ️</span>
  <p>The full local setup requires Python 3.12+ and FFmpeg. For quick cloud testing, deploy to Render using the included <code>render.yaml</code> — see the <a href="/docs/deployment" onclick="navigate('/docs/deployment');return false;">Deployment guide</a>.</p>
</div>

<h2>Base URL</h2>
<p>All API endpoints are served from the same origin as the frontend:</p>
${codeBlock('text', 'Local:   http://localhost:8000\nRender:  https://consolidated-echoecho.onrender.com')}
`,

'/docs/how-it-works': () => `
<div class="page-header">
  <div class="page-eyebrow">Introduction</div>
  <h1 class="page-title">How It Works</h1>
  <p class="page-desc">Echo Echo uses a pipeline of AI services — from music generation to lyrics to copyright — all coordinated by a single FastAPI server.</p>
</div>

<h2>Architecture overview</h2>
<div class="arch">
  <div class="arch-row"><span class="arch-label">Browser</span><div class="arch-box" style="background:#ede9fe;border-color:#c4b5fd;color:#5b21b6">Vanilla HTML/CSS/JS</div><span class="arch-arrow">→</span><div class="arch-box" style="background:#ede9fe;border-color:#c4b5fd;color:#5b21b6">Three.js Background</div></div>
  <div class="arch-row"><span class="arch-label">HTTP</span><span class="arch-arrow" style="margin-left:90px">↓ POST /api/generate</span></div>
  <div class="arch-row"><span class="arch-label">Backend</span><div class="arch-box" style="background:#fef3c7;border-color:#fcd34d;color:#92400e">FastAPI + Uvicorn</div><span class="arch-arrow">→</span><div class="arch-box" style="background:#fef3c7;border-color:#fcd34d;color:#92400e">api_generator.py</div></div>
  <div class="arch-row"><span class="arch-label">Music AI</span><div class="arch-box" style="background:#d1fae5;border-color:#6ee7b7;color:#064e3b">Kie.AI API</div><span class="arch-arrow">→</span><div class="arch-box" style="background:#d1fae5;border-color:#6ee7b7;color:#064e3b">Suno v4 model</div><span class="arch-arrow">→</span><div class="arch-box" style="background:#d1fae5;border-color:#6ee7b7;color:#064e3b">Webhook callback</div></div>
  <div class="arch-row"><span class="arch-label">Agent AI</span><div class="arch-box" style="background:#fee2e2;border-color:#fca5a5;color:#7f1d1d">CrewAI</div><span class="arch-arrow">→</span><div class="arch-box" style="background:#fee2e2;border-color:#fca5a5;color:#7f1d1d">Groq / Llama 3.1</div></div>
  <div class="arch-row"><span class="arch-label">Storage</span><div class="arch-box" style="background:#f0f9ff;border-color:#bae6fd;color:#075985">song_history.json</div><span class="arch-arrow">+</span><div class="arch-box" style="background:#f0f9ff;border-color:#bae6fd;color:#075985">backend/generated/</div></div>
</div>

<h2>Generation pipeline</h2>
<ol class="step-list">
  <li><div class="step-body"><div class="step-title">Request arrives at <code>POST /api/generate</code></div><div class="step-desc">The browser sends mood, genre, theme, tempo, energy and other parameters as JSON.</div></div></li>
  <li><div class="step-body"><div class="step-title">Prompt is built</div><div class="step-desc"><code>composer.py</code> combines your inputs into a natural-language descriptor like <em>"melancholic lo-fi piano, slow tempo, nostalgic rainy day"</em>.</div></div></li>
  <li><div class="step-body"><div class="step-title">Submitted to Kie.AI</div><div class="step-desc"><code>api_generator.py</code> POSTs the prompt to Kie.AI which queues it with Suno v4. A webhook callback URL is registered so Kie.AI can notify Echo Echo when the audio is ready.</div></div></li>
  <li><div class="step-body"><div class="step-title">Audio downloaded &amp; saved</div><div class="step-desc">When the callback fires at <code>/api/kieai/callback</code>, the MP3 is downloaded from Kie.AI's CDN and saved to <code>backend/generated/</code>.</div></div></li>
  <li><div class="step-body"><div class="step-title">Lyrics agent runs</div><div class="step-desc">A CrewAI agent powered by Groq (Llama 3.1 8B instant) writes verse/chorus/bridge lyrics matching the style.</div></div></li>
  <li><div class="step-body"><div class="step-title">Copyright check</div><div class="step-desc">A second AI agent scans the lyrics for similarity to known songs and returns a safety verdict.</div></div></li>
  <li><div class="step-body"><div class="step-title">Record persisted</div><div class="step-desc">Everything — song ID, audio filename, lyrics, copyright result — is appended to <code>song_history.json</code>.</div></div></li>
</ol>

<h2>Two generation modes</h2>
<p>Echo Echo supports two music generation backends:</p>
<table class="param-table">
  <tr><th>Mode</th><th>Backend</th><th>Quality</th><th>Speed</th><th>Requirement</th></tr>
  <tr><td><code>api</code></td><td>Kie.AI → Suno v4</td><td>Professional</td><td>~30–60s</td><td><code>KIEAI_API_KEY</code></td></tr>
  <tr><td><code>musicgen</code></td><td>Facebook MusicGen (local)</td><td>Research-grade</td><td>Minutes</td><td>GPU / high-end CPU</td></tr>
</table>
<div class="callout callout-warn">
  <span class="callout-icon">⚠️</span>
  <p>The local MusicGen model requires ~4GB VRAM and is excluded from the cloud deployment to keep the Render build small. On Render, only <code>api</code> mode is available.</p>
</div>
`,

'/docs/tech-stack': () => `
<div class="page-header">
  <div class="page-eyebrow">Setup</div>
  <h1 class="page-title">Tech Stack</h1>
  <p class="page-desc">Every library, API, and service powering Echo Echo — and exactly why each was chosen.</p>
</div>

<h2>Backend</h2>
<div class="card-grid">
  <div class="card"><div class="card-icon">⚡</div><div class="card-name">FastAPI</div><div class="card-desc">Async Python web framework. Handles all API routes, serves frontend HTML via FileResponse, and provides automatic OpenAPI documentation.</div></div>
  <div class="card"><div class="card-icon">🚀</div><div class="card-name">Uvicorn</div><div class="card-desc">ASGI server that runs FastAPI. Used both in development (<code>--reload</code>) and production (Render start command).</div></div>
  <div class="card"><div class="card-icon">🎵</div><div class="card-name">Kie.AI API</div><div class="card-desc">Wraps Suno v4 to generate professional-quality music from text prompts. Uses webhook callbacks to deliver the final MP3.</div></div>
  <div class="card"><div class="card-icon">🤖</div><div class="card-name">CrewAI</div><div class="card-desc">Multi-agent framework that orchestrates the lyrics writer and copyright checker as autonomous AI tasks with defined roles and goals.</div></div>
  <div class="card"><div class="card-icon">🧠</div><div class="card-name">Groq / Llama 3.1</div><div class="card-desc">Llama 3.1 8B Instant served via Groq's API. Powers both CrewAI agents — extremely fast inference (~200 tokens/sec).</div></div>
  <div class="card"><div class="card-icon">🔊</div><div class="card-name">Pydub + FFmpeg</div><div class="card-desc">Trims MP3 files to a target duration client-side on the server. FFmpeg must be installed on the host for trimming to work.</div></div>
  <div class="card"><div class="card-icon">🌐</div><div class="card-name">HTTPX</div><div class="card-desc">Async HTTP client used by <code>api_generator.py</code> to communicate with Kie.AI endpoints without blocking the event loop.</div></div>
  <div class="card"><div class="card-icon">🎼</div><div class="card-name">MusicGen (optional)</div><div class="card-desc">Facebook's local text-to-music model via HuggingFace Transformers. Not deployed to Render; used for local experimentation.</div></div>
</div>

<h2>Frontend</h2>
<div class="card-grid">
  <div class="card"><div class="card-icon">📄</div><div class="card-name">Vanilla HTML/CSS/JS</div><div class="card-desc">No framework. Each page is a standalone HTML file served by FastAPI's FileResponse — zero build step.</div></div>
  <div class="card"><div class="card-icon">🌊</div><div class="card-name">Three.js</div><div class="card-desc">WebGL animated wave background on the landing page. Loaded as an ES module from <code>/static/</code>.</div></div>
  <div class="card"><div class="card-icon">🔐</div><div class="card-name">localStorage Auth</div><div class="card-desc">Auth token stored as <code>echo_auth_token</code> in localStorage. Sent as <code>Authorization: Bearer {token}</code> on API calls.</div></div>
  <div class="card"><div class="card-icon">🔤</div><div class="card-name">Inter + JetBrains Mono</div><div class="card-desc">Inter for body text and UI; JetBrains Mono for all code blocks and technical content. Loaded via Google Fonts.</div></div>
</div>

<h2>Infrastructure</h2>
<div class="card-grid">
  <div class="card"><div class="card-icon">☁️</div><div class="card-name">Render</div><div class="card-desc">Cloud PaaS hosting the production deployment. Free tier with ephemeral filesystem — generated audio is lost on redeploy. Use a Render Disk for persistence.</div></div>
  <div class="card"><div class="card-icon">🐙</div><div class="card-name">GitHub</div><div class="card-desc">Source of truth. Render auto-deploys on every push to the default branch via the <code>render.yaml</code> blueprint.</div></div>
</div>

<h2>Python dependencies (cloud)</h2>
${codeBlock('text', '# requirements-deploy.txt\nfastapi[standard]>=0.115\nuvicorn[standard]>=0.34\nhttpx>=0.28\npydantic>=2.11\npython-multipart>=0.0.20\ngroq>=0.25\ncrewai>=0.100\npydub>=0.25')}
`,

${codeBlock('bash', '# macOS / Linux\npython -m venv venv\nsource venv/bin/activate\n\n# Windows (Command Prompt)\npython -m venv venv\nvenv\\Scripts\\activate')}

<h2>3. Install dependencies</h2>
${codeBlock('bash', '# Full local install (includes MusicGen / torch)\npip install -r requirements.txt\n\n# Lightweight cloud install (no torch)\npip install -r requirements-deploy.txt')}

<h2>4. Create a <code>.env</code> file</h2>

${codeBlock('text', '# .env\nGROQ_API_KEY=gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxx\n\n# Optional: enables Kie.AI music generation\nKIEAI_API_KEY=your-kieai-api-key\nPUBLIC_BASE_URL=http://localhost:8000   # must be publicly reachable for callbacks\n\n# Optional: allow public sign-ups\nECHO_SIGNUPS_OPEN=1')}

'/docs/environment': () => `
<div class="page-header">
  <div class="page-eyebrow">Setup</div>
  <h1 class="page-title">Environment Variables</h1>
  <p class="page-desc">All configurable environment variables for Echo Echo — which are required, which are optional, and what each does.</p>
</div>

<table class="param-table">
  <tr><th>Variable</th><th>Required</th><th>Description</th></tr>
  <tr><td><code>GROQ_API_KEY</code></td><td><span class="param-req">Required</span></td><td>Groq API key. Powers both the lyrics writer and copyright checker (Llama 3.1 8B Instant). Get one at <strong>console.groq.com</strong>.</td></tr>
  <tr><td><code>KIEAI_API_KEY</code></td><td><span class="param-opt">Optional</span></td><td>Kie.AI API key. Enables <code>api</code> mode music generation via Suno v4. Without this, only local MusicGen is available. Get one at <strong>kie.ai</strong>.</td></tr>
  <tr><td><code>PUBLIC_BASE_URL</code></td><td><span class="param-opt">Optional*</span></td><td>The publicly reachable base URL of your deployment (e.g. <code>https://consolidated-echoecho.onrender.com</code>). Required when <code>KIEAI_API_KEY</code> is set — Kie.AI uses it to POST webhook callbacks back to your server.</td></tr>
  <tr><td><code>ECHO_SIGNUPS_OPEN</code></td><td><span class="param-opt">Optional</span></td><td>Set to <code>1</code> to allow public sign-ups via <code>POST /api/auth/signup</code>. When unset or any other value, sign-ups are invite-only (returns HTTP 403).</td></tr>
</table>

<div class="callout callout-warn">
  <span class="callout-icon">⚠️</span>
  <p><code>PUBLIC_BASE_URL</code> must be a real public URL that Kie.AI can reach. <code>http://localhost:8000</code> will not work for callbacks in production — Kie.AI's servers can't reach your laptop. In production this is always your Render URL.</p>
</div>

<h2>Example .env file</h2>
${codeBlock('bash', '# .env (never commit this file)\nGROQ_API_KEY=gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx\nKIEAI_API_KEY=kie_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx\nPUBLIC_BASE_URL=https://consolidated-echoecho.onrender.com\nECHO_SIGNUPS_OPEN=1')}

<h2>How the app handles missing config</h2>
<p>At startup, <code>backend/main.py</code> calls <code>validate_kieai_config()</code>. If the config is invalid or missing, it logs a warning and disables Kie.AI mode — the server still starts and serves all other functionality.</p>
${codeBlock('python', '# backend/main.py — lifespan\n@asynccontextmanager\nasync def lifespan(_: FastAPI) -> AsyncIterator[None]:\n    ensure_files()\n    try:\n        validate_kieai_config()\n    except Exception as exc:\n        logger.warning("KieAI config invalid — API generation disabled: %s", exc)\n    Thread(target=warm_model, daemon=True).start()\n    yield')}
`,

'/docs/api/generate': () => `
<div class="page-header">
  <div class="page-eyebrow">API Reference</div>
  <h1 class="page-title">Generate Music</h1>
  <p class="page-desc">The core endpoint. Submit a mood, genre, and theme to generate a 30-second instrumental sketch with lyrics and copyright analysis.</p>
</div>

<div class="endpoint">
  <div class="endpoint-header">
    <span class="endpoint-method method-post">POST</span>
    <span class="endpoint-path">/api/generate</span>
    <span class="endpoint-desc">Generate a full song via Kie.AI (Suno v4)</span>
  </div>
  <div class="endpoint-body">
    <h4>Request body</h4>
    <table class="param-table">
      <tr><th>Field</th><th>Type</th><th>Required</th><th>Description</th></tr>
      <tr><td><code>moods</code></td><td>string[]</td><td><span class="param-req">Required</span></td><td>Array of mood descriptors, e.g. <code>["melancholic","dreamy"]</code></td></tr>

      <tr><td><code>themes</code></td><td>string[]</td><td><span class="param-opt">Optional</span></td><td>Array of thematic ideas, e.g. <code>["rainy day","nostalgia"]</code></td></tr>
      <tr><td><code>instruments</code></td><td>string[]</td><td><span class="param-opt">Optional</span></td><td>Instrument hints, e.g. <code>["piano","soft synth"]</code></td></tr>

      <tr><td><code>energy</code></td><td>integer</td><td><span class="param-opt">Optional</span></td><td>Energy level 1–10. Default: <code>4</code></td></tr>
      <tr><td><code>complexity</code></td><td>string</td><td><span class="param-opt">Optional</span></td><td><code>"Simple"</code> | <code>"Moderate"</code> | <code>"Rich"</code>. Default: <code>"Moderate"</code></td></tr>
      <tr><td><code>duration</code></td><td>integer</td><td><span class="param-opt">Optional</span></td><td>Target seconds 1–600. Default: <code>30</code></td></tr>
    </table>

    <h4>Code examples</h4>
    ${codeTabs([
      { label: 'cURL', code: `curl -X POST https://consolidated-echoecho.onrender.com/api/generate \\
  -H "Content-Type: application/json" \\
  -d '{
    "moods": ["melancholic", "dreamy"],
    "genres": ["lo-fi", "ambient"],
    "themes": ["rainy day", "nostalgia"],
    "instruments": ["piano", "soft synth"],
    "tempo": 72,

      { label: 'Python', code: `import httpx

payload = {

with httpx.Client(timeout=120) as client:

    )

print("Song ID:", data["song_id"])
print("Audio URL:", data["audio_url"])
print("Lyrics:", data["lyrics"]["text"])
print("Copyright:", data["copyright"]["status"])` },
      { label: 'JavaScript', code: `const payload = {
  moods: ["melancholic", "dreamy"],
  genres: ["lo-fi", "ambient"],
  themes: ["rainy day", "nostalgia"],
  instruments: ["piano", "soft synth"],
  tempo: 72,

};

const res = await fetch("/api/generate", {
  method: "POST",
  headers: { "Content-Type": "application/json" },

if (!res.ok) throw new Error(\`HTTP \${res.status}\`);
const data = await res.json();

console.log("Song ID:", data.song_id);
console.log("Audio URL:", data.audio_url);
console.log("Lyrics:", data.lyrics.text);

  },

  </div>
</div>

<h2>Generation status polling</h2>
<p>Because generation takes 30–90 seconds, the frontend polls <code>GET /generation-status</code> to show live progress:</p>
${codeTabs([
  { label: 'JavaScript', code: `async function pollStatus(onUpdate) {
  const interval = setInterval(async () => {
    const res = await fetch("/generation-status");
    const status = await res.json();
    onUpdate(status);
    if (!status.active) clearInterval(interval);
  }, 2000);
}

// Usage
pollStatus(({ stage, progress, elapsed_seconds }) => {
  console.log(\`[\${progress}%] \${stage} — \${elapsed_seconds}s elapsed\`);
});` },
  { label: 'Python', code: `import httpx, time

def poll_status(base_url: str) -> None:
    with httpx.Client() as client:
        while True:
            r = client.get(f"{base_url}/generation-status")
            s = r.json()

'/docs/api/lyrics': () => `
<div class="page-header">
  <div class="page-eyebrow">API Reference</div>
  <h1 class="page-title">Lyrics</h1>
  <p class="page-desc">Lyrics are automatically generated as part of every song generation. This page explains how the lyrics agent works and how lyrics are structured in the response.</p>
</div>

<h2>How lyrics are generated</h2>
<p>When a song is generated, <code>backend/agents/lyrics_agent.py</code> spins up a CrewAI agent with the following system:</p>
<ul>
  <li>The agent receives: mood, theme, style, genre, tempo, energy, complexity, and the generated prompt</li>
  <li>It uses Groq's Llama 3.1 8B Instant model (fastest option, ~200 tok/sec)</li>
  <li>It writes a full song with verse/pre-chorus/chorus/bridge structure</li>
  <li>Output is returned as a JSON object with <code>text</code> and <code>structure</code> fields</li>
</ul>

${codeBlock('python', `# backend/agents/lyrics_agent.py — how the agent is configured
from crewai import Agent, Task, Crew
from langchain_groq import ChatGroq

llm = ChatGroq(model="llama-3.1-8b-instant", api_key=os.getenv("GROQ_API_KEY"))

lyricist = Agent(
    role="Professional Lyricist",
    goal="Write emotionally resonant, original song lyrics",
    backstory="A Grammy-winning lyricist with expertise in all genres...",
    llm=llm,
    verbose=False,
)

task = Task(
    description=f"Write lyrics for a {mood} {style} song about {theme}...",
    expected_output="JSON with 'text' (full lyrics) and 'structure' (e.g. verse/chorus)",
    agent=lyricist,
)`)}

<h2>Lyrics response format</h2>
${codeBlock('json', `"lyrics": {
  "text": "Verse 1:\\nRain on glass, the world blurs soft\\nMemories drift like notes aloft\\n\\nPre-Chorus:\\nTime moves slow when you're not here\\n\\nChorus:\\nIn the quiet, I find you there\\nA melody that fills the air\\n\\nVerse 2:\\n...",
  "structure": "verse/pre-chorus/chorus"
}`)}

<h2>What if lyrics fail?</h2>
<p>If the Groq API is unavailable or the agent errors, the response still succeeds — lyrics degrade gracefully:</p>
${codeBlock('json', `"lyrics": {
  "text": "Lyrics generation is unavailable for this song, but the music was generated successfully.",
  "structure": "unavailable"
}`)}
<p>The copyright check is automatically skipped when lyrics are unavailable.</p>
`,

'/docs/api/auth': () => `
<div class="page-header">
  <div class="page-eyebrow">API Reference</div>
  <h1 class="page-title">Authentication</h1>
  <p class="page-desc">Echo Echo uses a lightweight invite-only auth system. Tokens are stored in localStorage and sent as Bearer tokens.</p>
</div>

<div class="endpoint">
  <div class="endpoint-header">
    <span class="endpoint-method method-post">POST</span>
    <span class="endpoint-path">/api/auth/login</span>
    <span class="endpoint-desc">Authenticate an existing user</span>
  </div>
  <div class="endpoint-body">
    <h4>Request body</h4>
    <table class="param-table">
      <tr><th>Field</th><th>Type</th><th>Required</th><th>Description</th></tr>
      <tr><td><code>email</code></td><td>string</td><td><span class="param-req">Required</span></td><td>User email address</td></tr>
      <tr><td><code>password</code></td><td>string</td><td><span class="param-req">Required</span></td><td>User password</td></tr>
    </table>

    <h4>Code examples</h4>
    ${codeTabs([
      { label: 'cURL', code: `curl -X POST https://consolidated-echoecho.onrender.com/api/auth/login \\
  -H "Content-Type: application/json" \\
  -d '{"email": "you@example.com", "password": "yourpassword"}'` },
      { label: 'Python', code: `import httpx

r = httpx.post(
    "https://consolidated-echoecho.onrender.com/api/auth/login",
    json={"email": "you@example.com", "password": "yourpassword"},
)
data = r.json()
token = data["token"]  # store this for subsequent requests` },
      { label: 'JavaScript', code: `const res = await fetch("/api/auth/login", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ email: "you@example.com", password: "yourpassword" }),
});
const { token } = await res.json();
localStorage.setItem("echo_auth_token", token);` },
    ])}

    <h4>Response</h4>
    ${codeBlock('json', `{ "token": "echo_abc123...", "email": "you@example.com", "name": "Your Name" }`)}
  </div>
</div>

<div class="endpoint">
  <div class="endpoint-header">
    <span class="endpoint-method method-post">POST</span>
    <span class="endpoint-path">/api/auth/signup</span>
    <span class="endpoint-desc">Create a new account (requires <code>ECHO_SIGNUPS_OPEN=1</code>)</span>
  </div>
  <div class="endpoint-body">
    <h4>Request body</h4>
    <table class="param-table">
      <tr><th>Field</th><th>Type</th><th>Required</th><th>Description</th></tr>
      <tr><td><code>email</code></td><td>string</td><td><span class="param-req">Required</span></td><td>Email address</td></tr>
      <tr><td><code>password</code></td><td>string</td><td><span class="param-req">Required</span></td><td>Password (min 8 chars)</td></tr>
      <tr><td><code>name</code></td><td>string</td><td><span class="param-opt">Optional</span></td><td>Display name</td></tr>
    </table>

    ${codeTabs([
      { label: 'cURL', code: `curl -X POST https://consolidated-echoecho.onrender.com/api/auth/signup \\
  -H "Content-Type: application/json" \\
  -d '{"name": "Sandeep", "email": "you@example.com", "password": "securepass123"}'` },
      { label: 'Python', code: `r = httpx.post(
    "https://consolidated-echoecho.onrender.com/api/auth/signup",
    json={"name": "Sandeep", "email": "you@example.com", "password": "securepass123"},
)
# Returns 403 if ECHO_SIGNUPS_OPEN is not set
data = r.json()
print(data["token"])` },
      { label: 'JavaScript', code: `const res = await fetch("/api/auth/signup", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ name: "Sandeep", email: "you@example.com", password: "securepass123" }),
});
if (res.status === 403) {
  console.error("Sign-ups are closed");
} else {
  const { token } = await res.json();
  localStorage.setItem("echo_auth_token", token);
}` },
    ])}
  </div>
</div>

<div class="callout callout-warn">
  <span class="callout-icon">⚠️</span>
  <p>By default (<code>ECHO_SIGNUPS_OPEN</code> not set), <code>POST /api/auth/signup</code> returns <strong>HTTP 403</strong>. Set <code>ECHO_SIGNUPS_OPEN=1</code> in your environment to allow public registration.</p>
</div>
`,

<h2>Step-by-step deployment</h2>
<ol class="step-list">
  <li><div class="step-body"><div class="step-title">Push to GitHub</div><div class="step-desc">Make sure all your changes are committed and pushed to <code>github.com/simplysandeepp/Consolidated-EchoEcho</code>.</div></div></li>

  <li><div class="step-body"><div class="step-title">Deploy</div><div class="step-desc">Click <em>Deploy</em>. Build takes ~2 minutes; the service starts and your app is live at the Render URL.</div></div></li>

  - type: web

function render(rawPath) {

  const page = PAGES[path] || PAGES['/docs'];

  document.title = 'Echo Echo — ' + (FLAT.find(n => n.path === path)?.label || 'Docs');

}
