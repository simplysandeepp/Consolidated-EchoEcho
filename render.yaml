services:
  - type: web
    name: echo-echo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # paste your Groq key in the Render dashboard
      - key: KIEAI_API_KEY
        sync: false # paste your Kie.AI key in the Render dashboard
      - key: PUBLIC_BASE_URL
        value: https://consolidated-echoecho.onrender.com
      - key: HF_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.6
